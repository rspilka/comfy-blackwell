scrape_configs:
  - job_name: 'blackwell-monitor'
    static_configs:
      - targets: ['comfy-monitor:9000']

  - job_name: 'host-metrics'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'container-metrics'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'gpu-metrics'
    static_configs:
      - targets: ['nvidia-exporter:9835']
